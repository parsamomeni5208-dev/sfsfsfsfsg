<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سایت مدرن من</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma}
body{background:#f5f5f5;color:#222}
header{background:#0d47a1;color:#fff;padding:18px;position:sticky;top:0}
nav{display:flex;justify-content:space-between;align-items:center}
nav ul{list-style:none;display:flex;gap:20px}
nav a{color:#fff;text-decoration:none;font-weight:bold}
.hero{background:linear-gradient(135deg,#2196F3,#00c853);color:#fff;text-align:center;padding:80px 20px}
.hero h1{font-size:42px;margin-bottom:15px}
.hero p{font-size:18px}
.btn{display:inline-block;margin-top:25px;padding:12px 28px;background:#fff;color:#0d47a1;border-radius:8px;text-decoration:none;font-weight:bold}
section{max-width:1100px;margin:auto;padding:50px 20px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.gallery img{width:100%;border-radius:12px}
.contact{background:#fff;border-radius:12px;padding:25px;box-shadow:0 0 10px rgba(0,0,0,.1)}
input,textarea{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:8px}
button{background:#0d47a1;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer}
footer{background:#111;color:#fff;text-align:center;padding:20px;margin-top:40px}
</style>
</head>
<body>
<header>
<nav>
<h2>🌐 سایت من</h2>
<ul>
<li><a href="#home">خانه</a></li>
<li><a href="#gallery">گالری</a></li>
<li><a href="#contact">تماس</a></li>
</ul>
</nav>
</header>
<section class="hero" id="home">
<h1>به سایت من خوش آمدید</h1>
<p>یک قالب مدرن و مناسب برای GitHub Pages</p>
<a class="btn" href="#gallery">مشاهده گالری</a>
</section>
<section id="gallery">
<h2>📷 گالری</h2>
<div class="gallery">
<img src="https://picsum.photos/500/300?1">
<img src="https://picsum.photos/500/300?2">
<img src="https://picsum.photos/500/300?3">
<img src="https://picsum.photos/500/300?4">
</div>
</section>
<section id="contact">
<div class="contact">
<h2>📞 تماس با ما</h2>
<input type="text" placeholder="نام">
<input type="email" placeholder="ایمیل">
<textarea rows="5" placeholder="پیام شما"></textarea>
<button>ارسال</button>
</div>
</section>
<footer>© 2026 تمامی حقوق محفوظ است.</footer>
</body>
</html>
